<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小猪惊喜！</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ffc0cb 0%, #ffdeeb 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        #container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .pig {
            position: absolute;
            font-size: 100px; /* 增大一点，符合“中度大” */
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        /* 猪的位置 - 离文字稍远一点，避免重叠 */
        .pig-top { top: -110px; left: 50%; transform: translateX(-50%) scale(0); }
        .pig-bottom { bottom: -110px; left: 50%; transform: translateX(-50%) scale(0); }
        .pig-left { left: -110px; top: 50%; transform: translateY(-50%) scale(0); }
        .pig-right { right: -110px; top: 50%; transform: translateY(-50%) scale(0); }

        .show .pig {
            opacity: 1;
        }
        .show .pig-top { transform: translateX(-50%) scale(1); animation: bounce 2s infinite; }
        .show .pig-bottom { transform: translateX(-50%) scale(1); animation: bounce 2s infinite 0.5s; }
        .show .pig-left { transform: translateY(-50%) scale(1); animation: bounce 2s infinite 1s; }
        .show .pig-right { transform: translateY(-50%) scale(1); animation: bounce 2s infinite 1.5s; }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0) scale(1); }
            50% { transform: translate(-50%, -10px) scale(1.1); }
        }
        /* 左右方向的 bounce 动画稍微不同 */
        .show .pig-left { animation: bounceLeft 2s infinite 1s; }
        .show .pig-right { animation: bounceRight 2s infinite 1.5s; }

        @keyframes bounceLeft {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translate(-10px, -50%) scale(1.1); }
        }
        @keyframes bounceRight {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translate(10px, -50%) scale(1.1); }
        }

        .central-text {
            font-size: 2.5rem;
            color: white;
            text-align: center;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background: #ff4d94;
            padding: 20px 40px;
            border-radius: 60px;
            box-shadow: 0 10px 30px rgba(255, 77, 148, 0.4);
            user-select: none;
            white-space: nowrap;
        }

        .show .central-text {
            opacity: 1;
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #ff4d94;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 148, 0.3);
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-start:hover {
            transform: scale(1.05);
            background: #ff1a75;
        }

        /* 装饰背景猪 */
        .floating-pig {
            position: absolute;
            font-size: 30px;
            opacity: 0.3;
            pointer-events: none;
            animation: float linear forwards;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

<button class="btn-start" id="startBtn">点击开启惊喜 🐷</button>

<div id="container">
    <div class="pig pig-top">🐷</div>
    <div class="pig pig-bottom">🐷</div>
    <div class="pig pig-left">🐷</div>
    <div class="pig pig-right">🐷</div>
    <div class="central-text">丁思凡小胖猪</div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const container = document.getElementById('container');
    const body = document.body;

    function createFloatingPig() {
        const pig = document.createElement('div');
        pig.className = 'floating-pig';
        pig.innerText = '🐷';
        pig.style.left = Math.random() * 100 + 'vw';
        const duration = Math.random() * 5 + 5;
        pig.style.animationDuration = duration + 's';
        body.appendChild(pig);
        setTimeout(() => pig.remove(), duration * 1000);
    }

    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none';
        container.classList.add('show');
        
        // 持续产生背景小猪
        setInterval(createFloatingPig, 1000);
        for(let i=0; i<10; i++) setTimeout(createFloatingPig, i * 200);
    });
</script>

</body>
</html>
